<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>月間カレンダー｜IBURI FAMILY</title>
<style>
:root{
  --blue:#2491d6;--teal:#1ac6b2;--navy:#16323e;--slate:#5a7480;
  --line:#dbe5e9;--bg:#f4f6f7;--sun:#e0574a;--sat:#2491d6;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#1e2b33}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(22,50,62,.08);padding:10px 14px}
.header-row{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{font-size:20px;margin:0;color:var(--navy)}
.sub{font-size:11px;color:var(--slate);margin-top:3px}
.actions{display:flex;gap:7px;flex-wrap:wrap}
button,a.btn{font:700 12px inherit;border:1px solid #cfd9dd;background:#fff;color:var(--slate);border-radius:7px;padding:8px 11px;text-decoration:none;cursor:pointer}
button.primary{border:none;color:#fff;background:linear-gradient(135deg,var(--blue),var(--teal))}
/* 週間カレンダーと共通のナビ配色 */
.actions a.nav-tab{background:#f4f6f7;color:var(--slate);border:1px solid #d7e6ea}
.actions a.nav-tab.calendar{background:#fff8dd;color:#7a651a;border-color:#d7e6ea}
.actions a.nav-tab.active{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;border-color:transparent}
.actions a.nav-tab:hover{filter:brightness(.98)}
.status{max-width:1200px;margin:7px auto 0;font-size:11px;color:var(--slate)}
.status.ok{color:#168f81}.status.err{color:#bf5249}.status.syncing{color:var(--blue)}
main{max-width:1200px;margin:auto;padding:14px}
.month-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.month-label{font-size:22px;font-weight:800;color:var(--navy);min-width:190px;text-align:center}
.calendar{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 3px 14px rgba(22,50,62,.08)}
.week-head,.days{display:grid;grid-template-columns:repeat(7,1fr)}
.week-head div{padding:9px 4px;text-align:center;font-size:12px;font-weight:800;color:#fff;background:#6b8592;border-right:1px solid rgba(255,255,255,.35)}
.week-head div:last-child{border-right:none}
.week-head .sun{background:#e38a80}.week-head .sat{background:#5aa8d8}
.day{min-height:135px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;background:#fff;cursor:pointer;overflow:hidden}
.day:nth-child(7n){border-right:none}
.day.empty{background:#fff;cursor:default}
.day:hover:not(.empty){background:#f4fbfd}
.num{font-size:13px;font-weight:800;margin-bottom:4px}
.day.sun .num{color:var(--sun)}.day.sat .num{color:var(--sat)}
.event{font-size:10px;line-height:1.45;background:#edf8fb;border-left:3px solid var(--teal);border-radius:3px;padding:3px 4px;margin:3px 0;white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}
.todo{font-size:9px;color:#667f89;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.brand{text-align:center;padding:14px;font-size:10px;color:#78909a;letter-spacing:1px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.36);display:none;align-items:center;justify-content:center;padding:14px;z-index:50}
.modal.open{display:flex}
.dialog{width:min(540px,100%);background:#fff;border-radius:12px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.22)}
.dialog h2{font-size:17px;margin:0 0 10px;color:var(--navy)}
.dialog label{display:block;font-size:11px;font-weight:700;color:var(--slate);margin:10px 0 4px}
.dialog textarea{width:100%;height:150px;border:1px solid #cfd9dd;border-radius:8px;padding:10px;font:13px inherit;resize:vertical}

.event-editor{display:grid;gap:6px}
.event-edit-row{display:flex;align-items:center;gap:6px;padding-left:0}




  .color-picker{position:relative;flex:0 0 auto}
  .color-tile{width:26px;height:26px;border:1px solid rgba(0,0,0,.16);border-radius:6px;padding:0;cursor:pointer;display:block}
  .color-tile[data-color="white"],.color-choice[data-color="white"]{background:#ffffff;border:1px solid #bfc7cf}
.color-tile[data-color="blue"],.color-choice[data-color="blue"]{background:#2491d6}
  .color-tile[data-color="orange"],.color-choice[data-color="orange"]{background:#ff9800}
  .color-tile[data-color="purple"],.color-choice[data-color="purple"]{background:#8e63ce}
  .color-tile[data-color="pink"],.color-choice[data-color="pink"]{background:#e97fa8}
  .color-palette{display:none;position:absolute;left:0;top:31px;z-index:50;background:#fff;border:1px solid #cfd9dd;border-radius:8px;padding:5px;gap:5px;box-shadow:0 5px 16px rgba(0,0,0,.18)}
  .color-picker.open .color-palette{display:flex}
  .color-choice{width:25px;height:25px;border:1px solid rgba(0,0,0,.14);border-radius:5px;padding:0;cursor:pointer}
  .color-choice.selected{outline:2px solid #263238;outline-offset:1px}

.event-edit-row input{flex:1;border:1px solid #cfd9dd;border-radius:6px;padding:7px;font:12px inherit}
.todo-row select{flex:1;border:1px solid #cfd9dd;border-radius:6px;padding:7px;font:11px inherit}
.todo-row input[type="text"]{flex:1.4}
.event.blue{border-left-color:#2491d6}.event.orange{border-left-color:#ff9800}.event.red{border-left-color:#ff9800}.event.purple{border-left-color:#8e63ce}.event.green{border-left-color:#8e63ce}.event.pink{border-left-color:#e97fa8}

.todo-list{display:grid;gap:6px}
.todo-row{display:flex;gap:6px;align-items:center}
.todo-row input[type="checkbox"]{width:16px;height:16px}
.todo-row input[type="text"]{flex:1;border:1px solid #cfd9dd;border-radius:6px;padding:7px;font:12px inherit}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.print-calendar{display:none}

@media(max-width:700px){
  .header-row{align-items:flex-start;flex-direction:column}
  .actions{width:100%}.actions>*{flex:1;text-align:center}
  main{padding:7px}.month-label{font-size:18px;min-width:150px}
  .day{min-height:105px;padding:4px}.event{font-size:9px}
}
@media(max-width:480px){
  .day{min-height:88px}.week-head div{font-size:10px;padding:7px 2px}
  .event{-webkit-line-clamp:3}
}
.day.today{background:#fff7cc!important;box-shadow:inset 0 0 0 2px #f2b705}
.day.today .num{background:#ffe78a;border-radius:50%;display:inline-block;padding:2px 6px}
@media print{
.day.today,.day.today .num{background:inherit!important;box-shadow:none!important}

  header,main,.brand,.modal{display:none!important}
  body{background:#fff!important;margin:0!important}
  .print-calendar{
    display:block!important;
    width:100%;
    padding:5mm 7mm;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    color:#1e2b33
  }
  .excel-title{
    background:linear-gradient(90deg,#2491d6,#1ac6b2);
    color:#fff;border:0.35mm solid #78909a;text-align:center;
    font-size:20pt;font-weight:700;padding:5mm 0;margin:0
  }
  .excel-week-head,.excel-days{display:grid;grid-template-columns:repeat(7,1fr)}
  .excel-week-head div{
    border-right:0.35mm solid #78909a;border-bottom:0.35mm solid #78909a;
    padding:2.5mm 1mm;text-align:center;font-size:10pt;font-weight:700;background:linear-gradient(160deg,#6b8592,#5a7480);color:#fff
  }
  .excel-week-head div:first-child{border-left:0.35mm solid #78909a}
  .excel-week-head .sun{background:#e38a80;color:#fff}
  .excel-week-head .sat{background:#5aa8d8;color:#fff}
  .excel-day{
    height:31mm;border-right:0.35mm solid #78909a;border-bottom:0.35mm solid #78909a;
    padding:2mm;overflow:hidden;background:#fff
  }
  .excel-day:nth-child(7n+1){border-left:0.35mm solid #78909a}
  .excel-day.empty{background:#fff}
  .excel-num{font-size:10pt;font-weight:700;margin-bottom:1mm}
  .excel-day.sun .excel-num{color:#c00000}
  .excel-day.sat .excel-num{color:#0070c0}
  .excel-event{
    font-size:8pt;line-height:1.25;white-space:pre-wrap;
    background:#edf8fb;border-left:1mm solid #1ac6b2;padding:1mm;margin-top:1mm;max-height:18mm;overflow:hidden
  }
  .excel-todo{font-size:7pt;line-height:1.2;margin-top:1mm;color:#444}
  @page{size:A4 landscape;margin:0}
}



.todo-combo{position:relative;flex:1;min-width:0}
.todo-combo input[type="text"]{
  width:100%;
  box-sizing:border-box;
  border:1px solid #cfd9dd;
  border-radius:7px;
  padding:8px 30px 8px 9px;
  font:12px inherit;
  background:#fff;
}
.todo-combo::after{
  content:"▾";
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:#65737a;
  font-size:11px;
}

<body>
<header>
  <div class="header-row">
    <div>
      <h1>月間カレンダー</h1>

    </div>
    <div class="actions">

      <button id="reloadBtn">最新を読込</button>
      <button id="printBtn">印刷</button>
    </div>
  </div>
  <div id="status" class="status">同期情報を確認しています…</div>
</header>

<main>
  <div class="month-nav">
    <button id="prevBtn">← 前月</button>
    <div id="monthLabel" class="month-label"></div>
    <button id="nextBtn">翌月 →</button>

<div class="calendar">

      <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
    </div>
    <div id="days" class="days"></div>
  </div>
</main>
<div class="family-legend" aria-label="予定色の説明">
  <span><i data-color="white"></i>予定なし</span>
  <span><i data-color="blue"></i>パパ</span>
  <span><i data-color="orange"></i>ママ</span>

  <a class="calendar-link active" href="monthly_calendar.html" data-page="month">月間</a>
  <a class="calendar-link" href="annual_calendar.html" data-page="year">年間</a>

<div id="modal" class="modal">
  <div class="dialog">
    <h2 id="editTitle"></h2>
    <label for="scheduleEdit">予定</label>
    <div id="eventEditList" class="event-editor"></div>
    <label>TODO</label>
    <div id="todoEditList" class="todo-list"></div>
    <div class="dialog-actions">
      <button id="cancelBtn">キャンセル</button>
      <button class="primary" id="saveBtn">保存して同期</button>
    </div>
  </div>
</div>

<script>
const DOW=['日','月','火','水','木','金','土'];
const WEEKS_KEY='planner2-weeks-db-v1';
const TODOS_KEY='planner2-todos-db-v1';
const GH_KEY='planner2-github-cfg-v1';
const GIST_FILE='route-planner2-data.json';

let weeksDB={};
let todosDB={items:[]};
let ghCfg={token:'',gistId:''};
let selectedDate=null;
let syncing=false;
let shown=new Date();
shown.setDate(1);

function pad(n){return String(n).padStart(2,'0')}
function fmt(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function mondayOf(d){const x=new Date(d);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x}
function emptyWeek(){
  return {days:Array.from({length:7},()=>({schedule:'',todos:Array.from({length:4},()=>({checked:false,text:'',todoId:null}))})),memo:''};
}
function weekAndIndex(date){
  const m=mondayOf(date),key=fmt(m),idx=(date.getDay()+6)%7;
  if(!weeksDB[key])weeksDB[key]=emptyWeek();
  return {key,idx,week:weeksDB[key]};
}
function setStatus(t,k=''){const e=document.getElementById('status');e.textContent=t;e.className='status '+k}
function loadLocal(){
  try{weeksDB=JSON.parse(localStorage.getItem(WEEKS_KEY)||'{}')||{}}catch(e){weeksDB={}}
  try{
    todosDB=JSON.parse(localStorage.getItem(TODOS_KEY)||'{"items":[]}')||{items:[]};
    if(!todosDB||!Array.isArray(todosDB.items)) todosDB={items:[]};
  }catch(e){todosDB={items:[]}}
  try{ghCfg=JSON.parse(localStorage.getItem(GH_KEY)||'{}')||{}}catch(e){ghCfg={}}
  syncLinkedTodosFromMaster();
}
function saveLocal(){
  normalizeAllEventColors();
  syncLinkedTodosFromMaster();
  localStorage.setItem(WEEKS_KEY,JSON.stringify(weeksDB));
  localStorage.setItem(TODOS_KEY,JSON.stringify(todosDB));
}
function headers(){
  return {'Authorization':'Bearer '+ghCfg.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'};
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function normalizeDayTodos(dayData){
  if(!Array.isArray(dayData.todos)) dayData.todos=[];
  while(dayData.todos.length<4){
    dayData.todos.push({checked:false,text:'',todoId:null});
  }
  dayData.todos=dayData.todos.slice(0,4);
  dayData.todos.forEach(t=>{
    if(typeof t.checked!=='boolean') t.checked=false;
    if(typeof t.text!=='string') t.text='';
    if(t.todoId===undefined) t.todoId=null;
  });
}


function colorPickerHtml(color='white'){
  return `<div class="color-picker" data-color="${color}">
    <button type="button" class="color-tile" data-color="${color}" aria-label="色を選択"></button>
    <div class="color-palette">
      ${['white','blue','orange','purple','pink'].map(c=>`<button type="button" class="color-choice ${c===color?'selected':''}" data-color="${c}" aria-label="${c}"></button>`).join('')}
    </div>
  </div>`;
}
function setupColorPicker(picker,onChange){
  const tile=picker.querySelector('.color-tile');
  const choices=[...picker.querySelectorAll('.color-choice')];
  tile.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.color-picker.open').forEach(p=>{if(p!==picker)p.classList.remove('open')});
    picker.classList.toggle('open');
  });
  choices.forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const color=btn.dataset.color;
    picker.dataset.color=color;
    tile.dataset.color=color;
    choices.forEach(x=>x.classList.toggle('selected',x===btn));
    picker.classList.remove('open');
    if(onChange) onChange(color);
  }));
}
document.addEventListener('click',()=>document.querySelectorAll('.color-picker.open').forEach(p=>p.classList.remove('open')));

const EVENT_COLORS={
  white:{label:'',hex:'#ffffff'},
  blue:{label:'パパ',hex:'#2491d6'},
  orange:{label:'ママ',hex:'#ff9800'},
  red:{label:'ママ',hex:'#ff9800'},
  purple:{label:'蒼一郎',hex:'#8e63ce'},
  green:{label:'蒼一郎',hex:'#8e63ce'},
  pink:{label:'かのこ',hex:'#e97fa8'}
};
function normalizeEvents(dayData){
  if(!Array.isArray(dayData.events)){
    const lines=String(dayData.schedule||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
    dayData.events=lines.map(text=>({text,color:'white'}));
  }
  dayData.events=dayData.events
    .filter(e=>e&&typeof e.text==='string')
    .map(e=>({text:e.text,color:e.color==='green'?'purple':(e.color==='red'?'orange':(EVENT_COLORS[e.color]?e.color:'white'))}));
  while(dayData.events.length<4) dayData.events.push({text:'',color:'white'});
}
function normalizeAllEventColors(){
  Object.values(weeksDB||{}).forEach(week=>{
    if(!week||!Array.isArray(week.days)) return;
    week.days.forEach(day=>{ normalizeEvents(day); syncScheduleFromEvents(day); });
  });
}
function syncScheduleFromEvents(dayData){
  normalizeEvents(dayData);
  dayData.schedule=dayData.events.map(e=>e.text.trim()).filter(Boolean).join('\n');
}
function masterTodoOptions(selectedId=''){
  let html='<option value="">TODOリストから選択</option>';
  (todosDB.items||[]).filter(t=>!t.done).forEach(t=>{
    html+=`<option value="${t.id}" ${t.id===selectedId?'selected':''}>${escapeHtml(t.text||'(未入力)')}</option>`;
  });
  return html;
}
function newTodoId(){
  const now=Date.now().toString(36);
  const rand=Math.random().toString(36).slice(2,10);
  return `todo-${now}-${rand}`;
}

function syncLinkedTodosFromMaster(){
  if(!todosDB||!Array.isArray(todosDB.items)) todosDB={items:[]};
  const masterMap=new Map(todosDB.items.map(t=>[t.id,t]));
  Object.values(weeksDB||{}).forEach(week=>{
    if(!week||!Array.isArray(week.days)) return;
    week.days.forEach(day=>{
      if(!day||!Array.isArray(day.todos)) return;
      day.todos.forEach(todo=>{
        if(!todo||!todo.todoId) return;
        const master=masterMap.get(todo.todoId);
        if(master){
          todo.text=String(master.text||'');
          todo.checked=!!master.done;
        }else{
          todo.todoId=null;
        }
      });
    });
  });
}

function linkOrCreateTodo(todo){
  const text=String(todo.text||'').trim();
  if(!text){todo.todoId=null;return}
  if(todo.todoId){
    const linked=todosDB.items.find(t=>t.id===todo.todoId);
    if(linked){linked.text=text;linked.done=!!todo.checked;return}
    todo.todoId=null;
  }
  let found=todosDB.items.find(t=>!t.done&&String(t.text||'').trim()===text);
  if(!found){
    found={id:newTodoId(),text,done:!!todo.checked};
    todosDB.items.push(found);
  }
  todo.todoId=found.id;
}

function syncDayTodosToMaster(dayData, previousTodos){
  normalizeDayTodos(dayData);
  const prev=Array.isArray(previousTodos)?previousTodos:[];
  dayData.todos.forEach((todo,i)=>{
    const old=prev[i]||{};
    const oldId=old.todoId||null;

    // Linked master TODO: checkbox and text changes are reflected everywhere.
    if(oldId){
      const master=todosDB.items.find(x=>x.id===oldId);
      if(master){
        if(todo.text.trim()){
          master.text=todo.text;
          master.done=todo.checked;
          todo.todoId=master.id;
        }else{
          // Emptying a linked daily row only removes it from that day.
          todo.todoId=null;
        }
      }
    }

    // If the row still carries a valid link, keep master completion synchronized.
    if(todo.todoId){
      const master=todosDB.items.find(x=>x.id===todo.todoId);
      if(master){
        master.text=todo.text;
        master.done=todo.checked;
      }else{
        todo.todoId=null;
      }
    }
  });
}

async function pull(){
  if(syncing)return;
  if(!ghCfg.token||!ghCfg.gistId){
    setStatus('週間カレンダーでGitHubトークンとGist IDを設定してください','err');
    render();return;
  }
  syncing=true;setStatus('クラウドから最新予定を読み込んでいます…','syncing');
  try{
    const r=await fetch('https://api.github.com/gists/'+ghCfg.gistId,{headers:headers()});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const file=data.files&&data.files[GIST_FILE];
    if(!file)throw new Error('データファイルが見つかりません');
    let content=file.content;
    if(file.truncated&&file.raw_url)content=await(await fetch(file.raw_url)).text();
    const parsed=JSON.parse(content);
    if(parsed.weeks)weeksDB=parsed.weeks;
    if(parsed.todos)todosDB=parsed.todos;
    normalizeAllEventColors();
    if(!todosDB||!Array.isArray(todosDB.items)) todosDB={items:[]};
    saveLocal();render();
    setStatus('最新予定を読み込みました：'+new Date().toLocaleTimeString('ja-JP'),'ok');
  }catch(e){console.error(e);setStatus('読込に失敗しました。接続設定を確認してください','err');render()}
  finally{syncing=false}
}
async function push(){
  if(!ghCfg.token||!ghCfg.gistId){setStatus('GitHub接続情報がありません','err');return}
  syncing=true;setStatus('保存して同期しています…','syncing');
  normalizeAllEventColors();
  const body={description:'進路相談室 ROUTE - 別ユーザー用週間カレンダー データ',public:false,files:{
    [GIST_FILE]:{content:JSON.stringify({version:3,updatedAt:new Date().toISOString(),weeks:weeksDB,todos:todosDB},null,2)}
  }};
  try{
    const r=await fetch('https://api.github.com/gists/'+ghCfg.gistId,{method:'PATCH',headers:headers(),body:JSON.stringify(body)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    saveLocal();render();setStatus('予定を保存・同期しました：'+new Date().toLocaleTimeString('ja-JP'),'ok');
  }catch(e){console.error(e);setStatus('保存に失敗しました','err')}
  finally{syncing=false}
}


function renderSharedTodoPanels(){
  const todoBox=document.getElementById('sharedTodoList');
  const doneBox=document.getElementById('sharedDoneList');
  if(!todoBox||!doneBox) return;

  const active=(todosDB.items||[]).filter(t=>!t.done);
  const done=(todosDB.items||[]).filter(t=>t.done);

  const makeItem=(item,isDone)=>{
    const row=document.createElement('div');
    row.className='todo-panel-item';
    row.innerHTML=`<input type="checkbox" ${isDone?'checked':''}><div class="text">${escapeHtml(item.text||'')}</div>`;
    const check=row.querySelector('input[type="checkbox"]');
    check.addEventListener('change',async()=>{
      item.done=check.checked;
      saveLocal();
          if(typeof render==='function') render();
      if(typeof push==='function') await push();
    });
    return row;
  };

  todoBox.innerHTML='';
  doneBox.innerHTML='';

  if(active.length===0){
    todoBox.innerHTML='<div class="todo-panel-empty">未完了のTODOはありません</div>';
  }else{
    active.forEach(item=>todoBox.appendChild(makeItem(item,false)));
  }

  if(done.length===0){
    doneBox.innerHTML='<div class="todo-panel-empty">完了したTODOはありません</div>';
  }else{
    done.forEach(item=>doneBox.appendChild(makeItem(item,true)));
  }
}



// 日本の祝日（国民の祝日・振替休日・国民の休日）
const holidayCache = new Map();
function nthWeekday(year, month, weekday, nth){
  const first = new Date(year, month - 1, 1);
  return 1 + ((7 + weekday - first.getDay()) % 7) + (nth - 1) * 7;
}
function dateKeyLocal(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function japaneseHolidays(year){
  if(holidayCache.has(year)) return holidayCache.get(year);
  const map = new Map();
  const add=(m,d,name)=>map.set(`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,name);
  add(1,1,'元日');
  if(year>=2000) add(1,nthWeekday(year,1,1,2),'成人の日');
  else add(1,15,'成人の日');
  if(year>=1967) add(2,11,'建国記念の日');
  if(year>=2020) add(2,23,'天皇誕生日');
  const vernal = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(3,vernal,'春分の日');
  add(4,29,year>=2007?'昭和の日':(year>=1989?'みどりの日':'天皇誕生日'));
  add(5,3,'憲法記念日');
  if(year>=2007) add(5,4,'みどりの日');
  add(5,5,'こどもの日');
  if(year>=2003) add(7,nthWeekday(year,7,1,3),'海の日'); else if(year>=1996) add(7,20,'海の日');
  if(year>=2016) add(8,11,'山の日');
  if(year>=2003) add(9,nthWeekday(year,9,1,3),'敬老の日'); else if(year>=1966) add(9,15,'敬老の日');
  const autumnal = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(9,autumnal,'秋分の日');
  if(year>=2000) add(10,nthWeekday(year,10,1,2),year>=2020?'スポーツの日':'体育の日');
  else add(10,10,'体育の日');
  add(11,3,'文化の日');
  add(11,23,'勤労感謝の日');
  if(year>=1989 && year<=2018) add(12,23,'天皇誕生日');

  // 国民の休日（祝日に挟まれた平日）
  for(let m=1;m<=12;m++){
    const last=new Date(year,m,0).getDate();
    for(let d=2;d<last;d++){
      const cur=new Date(year,m-1,d);
      const key=dateKeyLocal(cur);
      if(map.has(key)) continue;
      const prev=new Date(year,m-1,d-1), next=new Date(year,m-1,d+1);
      if(map.has(dateKeyLocal(prev)) && map.has(dateKeyLocal(next))) map.set(key,'国民の休日');
    }
  }
  // 振替休日
  const originals=[...map.entries()];
  originals.forEach(([key])=>{
    const d=new Date(key+'T00:00:00');
    if(d.getDay()!==0) return;
    let sub=new Date(d);
    do{sub.setDate(sub.getDate()+1)}while(map.has(dateKeyLocal(sub)));
    map.set(dateKeyLocal(sub),'振替休日');
  });
  holidayCache.set(year,map);
  return map;
}
function getHolidayName(d){ return japaneseHolidays(d.getFullYear()).get(dateKeyLocal(d)) || ''; }
function render(){
  syncLinkedTodosFromMaster();
  renderSharedTodoPanels();
  document.getElementById('monthLabel').textContent=`${shown.getFullYear()}年 ${shown.getMonth()+1}月`;
  const root=document.getElementById('days');root.innerHTML='';
  const first=new Date(shown.getFullYear(),shown.getMonth(),1);
  const last=new Date(shown.getFullYear(),shown.getMonth()+1,0);
  for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='day empty';root.appendChild(e)}
  for(let n=1;n<=last.getDate();n++){
    const d=new Date(shown.getFullYear(),shown.getMonth(),n);
    const {week,idx}=weekAndIndex(d),dayData=week.days[idx]||{};
    normalizeDayTodos(dayData);
    normalizeEvents(dayData);
    const events=dayData.events.filter(e=>e.text.trim());
    const todoTexts=(dayData.todos||[]).filter(t=>t&&t.text&&!t.checked).map(t=>t.text);
    const cell=document.createElement('div');
    const now=new Date();
    const today=(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate());
    const holiday=getHolidayName(d);
    cell.className='day '+(d.getDay()===0?'sun':d.getDay()===6?'sat':'')+(today?' today':'')+(holiday?' holiday':'');
    cell.innerHTML=`<div class="num">${n}</div>${holiday?`<div class="holiday-label">${escapeHtml(holiday)}</div>`:''}${events.map(e=>`<div class="event ${e.color}">${escapeHtml(e.text)}</div>`).join('')}${todoTexts.slice(0,4).map(t=>`<div class="todo">□ ${escapeHtml(t)}</div>`).join('')}`;
    cell.addEventListener('click',()=>openEdit(d));
    root.appendChild(cell);
  }
  const total=first.getDay()+last.getDate();
  for(let i=total;i<42;i++){const e=document.createElement('div');e.className='day empty';root.appendChild(e)}
}
function openEdit(d){
  selectedDate=d;
  const {week,idx}=weekAndIndex(d),dayData=week.days[idx];
  normalizeDayTodos(dayData);
  document.getElementById('editTitle').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
  normalizeEvents(dayData);
  const eventList=document.getElementById('eventEditList');
  eventList.innerHTML='';
  dayData.events.forEach((event,i)=>{
    const row=document.createElement('div');
    row.className='event-edit-row';
    row.dataset.color=event.color;
    row.innerHTML=`${colorPickerHtml(event.color)}<input type="text" value="${escapeHtml(event.text||'')}" placeholder="">`;
    setupColorPicker(row.querySelector('.color-picker'),color=>row.dataset.color=color);
    eventList.appendChild(row);
  });
  const list=document.getElementById('todoEditList');list.innerHTML='';
  dayData.todos.forEach((t,i)=>{
    const row=document.createElement('div');row.className='todo-row';
    const listId=`todoOptions_${selectedDate.getFullYear()}_${selectedDate.getMonth()+1}_${selectedDate.getDate()}_${i}`;
    row.innerHTML=`<input type="checkbox" ${t.checked?'checked':''}>
      <div class="todo-combo">
        <input type="text" list="${listId}" value="${escapeHtml(t.text||'')}" placeholder="">
        <datalist id="${listId}">
          ${(todosDB.items||[]).filter(x=>!x.done).map(x=>`<option value="${escapeHtml(x.text||'')}"></option>`).join('')}
        </datalist>
      </div>`;
    const input=row.querySelector('input[type="text"]');
    input.addEventListener('change',()=>{
      const found=(todosDB.items||[]).find(x=>!x.done&&String(x.text||'').trim()===input.value.trim());
      if(found) t.todoId=found.id;
    });
    list.appendChild(row);
  });
  document.getElementById('modal').classList.add('open');
}
function closeEdit(){document.getElementById('modal').classList.remove('open');selectedDate=null}
document.getElementById('cancelBtn').onclick=closeEdit;
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeEdit()});
document.getElementById('saveBtn').onclick=async()=>{
  const saveBtn=document.getElementById('saveBtn');
  if(!selectedDate){
    setStatus('保存する日付が選択されていません','err');
    return;
  }

  const originalText=saveBtn.textContent;
  saveBtn.disabled=true;
  saveBtn.textContent='保存中…';

  try{
    if(!todosDB||!Array.isArray(todosDB.items)) todosDB={items:[]};

    const {week,idx}=weekAndIndex(selectedDate);
    const dayData=week.days[idx];
    normalizeDayTodos(dayData);
    const previousTodos=dayData.todos.map(t=>({...t}));

    const eventRows=[...document.querySelectorAll('#eventEditList .event-edit-row')];
    dayData.events=eventRows.map(r=>{
      const picker=r.querySelector('.color-picker');
      const input=r.querySelector('input[type="text"]');
      const color=(picker&&picker.dataset.color)||r.dataset.color||'white';
      return {
        color:EVENT_COLORS[color]?color:'white',
        text:input?input.value:''
      };
    });
    syncScheduleFromEvents(dayData);

    const rows=[...document.querySelectorAll('#todoEditList .todo-row')];
    dayData.todos=rows.map((r,i)=>{
      const input=r.querySelector('input[type="text"]');
      const check=r.querySelector('input[type="checkbox"]');
      const todoText=input?input.value.trim():'';
      const existing=todosDB.items.find(
        x=>!x.done&&String(x.text||'').trim()===todoText
      );
      return {
        checked:check?check.checked:false,
        text:todoText,
        todoId:(existing&&existing.id)||previousTodos[i]?.todoId||null
      };
    });

    dayData.todos.forEach(linkOrCreateTodo);
    syncDayTodosToMaster(dayData,previousTodos);

    // クラウドより先に端末へ保存する
    saveLocal();
    closeEdit();
    render();
    setStatus('端末に保存しました。クラウド同期中…','ok');

    await push();
  }catch(e){
    console.error('保存エラー',e);
    setStatus('保存できませんでした','err');
    alert('保存処理でエラーが発生しました。\n'+(e&&e.message?e.message:String(e)));
  }finally{
    saveBtn.disabled=false;
    saveBtn.textContent=originalText;
  }
};
document.getElementById('prevBtn').onclick=()=>{shown.setMonth(shown.getMonth()-1);render()};
document.getElementById('nextBtn').onclick=()=>{shown.setMonth(shown.getMonth()+1);render()};

document.getElementById('bottomSaveBtn').onclick=async()=>{
  if(document.getElementById('modal').classList.contains('open')){
    document.getElementById('saveBtn').click();
    return;
  }
  saveLocal();
  setStatus('端末に保存しました。クラウド同期中…','syncing');
  try{ await push(); }catch(e){ console.error(e); setStatus('端末には保存しました','ok'); }
};

document.getElementById('todayBtn').onclick=()=>{
  shown=new Date();
  shown.setDate(1);
  render();
};

document.getElementById('reloadBtn').onclick=pull;

function renderPrint(){
  const root=document.getElementById('printCalendar');
  root.innerHTML=`<div class="excel-title">${shown.getFullYear()}年 ${shown.getMonth()+1}月　月間カレンダー</div>`;
  const head=document.createElement('div');head.className='excel-week-head';
  head.innerHTML=DOW.map((d,i)=>`<div class="${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  root.appendChild(head);

  const grid=document.createElement('div');grid.className='excel-days';
  const first=new Date(shown.getFullYear(),shown.getMonth(),1);
  const last=new Date(shown.getFullYear(),shown.getMonth()+1,0);
  for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='excel-day empty';grid.appendChild(e)}
  for(let n=1;n<=last.getDate();n++){
    const d=new Date(shown.getFullYear(),shown.getMonth(),n);
    const {week,idx}=weekAndIndex(d),dayData=week.days[idx]||{};
    normalizeEvents(dayData);
    const events=dayData.events.filter(e=>e.text.trim());
    const schedule=events.map(e=>e.text).join('\n');
    const todos=(dayData.todos||[]).filter(t=>t&&t.text&&!t.checked).map(t=>t.text);
    const e=document.createElement('div');e.className='excel-day '+(d.getDay()===0?'sun':d.getDay()===6?'sat':'');
    e.innerHTML=`<div class="excel-num">${n}</div>${schedule?`<div class="excel-event">${escapeHtml(schedule)}</div>`:''}${todos.slice(0,4).map(t=>`<div class="excel-todo">□ ${escapeHtml(t)}</div>`).join('')}`;
    grid.appendChild(e);
  }
  const total=first.getDay()+last.getDate();
  for(let i=total;i<42;i++){const e=document.createElement('div');e.className='excel-day empty';grid.appendChild(e)}
  root.appendChild(grid);
}
document.getElementById('printBtn').onclick=()=>{renderPrint();window.print()};

window.addEventListener('storage',e=>{
  if(e.key!==WEEKS_KEY&&e.key!==TODOS_KEY)return;
  if(document.getElementById('modal').classList.contains('open'))return;
  loadLocal();
  render();
  setStatus('別のカレンダーでの変更を反映しました','ok');
});
window.addEventListener('pageshow',()=>{
  if(!document.getElementById('modal').classList.contains('open')){
    loadLocal();
    render();
  }
});
window.addEventListener('focus',()=>{if(navigator.onLine)pull()});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&navigator.onLine)pull()});
loadLocal();render();pull();setInterval(()=>{if(document.visibilityState==='visible'&&navigator.onLine)pull()},30000);
</script>

<script>
/* v14: fixed要素をレイアウトコンテナ外へ移動し、iPhone Safariでviewport固定を保証 */
(function(){
  function mountBottomNav(){
    const nav=document.querySelector('.bottom-nav');
    if(!nav) return;
    if(nav.parentElement!==document.body) document.body.appendChild(nav);
    nav.style.setProperty('position','fixed','important');
    nav.style.setProperty('bottom','0','important');
    nav.style.setProperty('left','0','important');
    nav.style.setProperty('right','0','important');
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',mountBottomNav,{once:true});
  else mountBottomNav();
  window.addEventListener('pageshow',mountBottomNav);
  window.addEventListener('orientationchange',()=>setTimeout(mountBottomNav,100));
})();
</script>
