<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家族カレンダー</title>
<style>
  :root {
    --blue: #2491d6;
    --blue-light: #2ea0e8;
    --teal: #1ac6b2;
    --teal-light: #26d4bd;
    --navy: #16323e;
    --slate: #5a7480;
    --line: #dde5e8;
    --line-soft: #c7d3d8;
    --border: #cfd9dd;
    --bg: #f4f6f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans CJK JP", "Yu Gothic", sans-serif;
    color: #1e2b33;
    padding: 24px 12px 60px;
    display: flex;
    justify-content: center;
  }
  .sheet {
    width: 100%;
    max-width: 620px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(22,50,62,0.10);
    padding: 22px 22px 20px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }
  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .title .sub {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--slate);
    letter-spacing: 1px;
    margin-top: 3px;
  }
  .datebox {
    display: flex;
    gap: 8px;
  }
  .datebox .field {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f4fbfd;
    border: 1px solid #d7e6ea;
    border-radius: 6px;
    padding: 5px 12px;
  }
  .datebox .field span.label {
    font-size: 9px;
    color: #8a9ba3;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .datebox input {
    border: none;
    background: transparent;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    text-align: center;
    font-family: inherit;
  }
  .datebox input:focus { outline: none; }
  .datebox .range-inputs {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .datebox .range-inputs input[type="date"] {
    width: 108px;
  }
  .datebox .range-sep {
    color: var(--slate);
    font-weight: 700;
  }
  .datebox .start-date {
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    min-width: 96px;
    text-align: center;
  }

  .accent-bar {
    height: 5px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--teal) 100%);
    margin-bottom: 14px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tab-btn {
    flex: 1;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 0;
    border: 1px solid var(--border);
    background: #f4f6f7;
    color: var(--slate);
    border-radius: 6px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--blue), var(--teal));
    color: #fff;
    border: none;
  }
  .calendar-link {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 4px;
    border: 1px solid var(--border);
    background: #fff8dd;
    color: #7a651a;
    border-radius: 6px;
    text-decoration: none;
  }
  .calendar-link:hover { background: #fff1b8; }
  .page { display: none; }
  .page.active { display: block; }

  /* Content row */
  .content-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
    margin-bottom: 14px;
  }
  .planner-table {
    width: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(22,50,62,0.06);
  }
  .table-header { display: flex; border-bottom: 1px solid var(--border); }
  .col-header {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    padding: 8px 0;
  }
  .col-header.date { width: 52px; flex-shrink: 0; background: linear-gradient(160deg, var(--blue-light), var(--blue)); }
  .col-header.schedule { flex: 1; background: linear-gradient(160deg, var(--blue-light), var(--blue)); border-left: 1px solid rgba(255,255,255,0.35); }
  .col-header.todo { width: 128px; flex-shrink: 0; background: linear-gradient(160deg, var(--teal-light), var(--teal)); font-size: 10px; border-left: 1px solid #fff; }

  .table-body { display: flex; flex: 1; }
  .day-column { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .day-todo-column { width: 128px; flex-shrink: 0; display: flex; flex-direction: column; }

  .day-row { display: flex; border-bottom: 1px solid var(--line); }
  .day-row:last-child { border-bottom: none; }
  .day-row:nth-child(odd) { background: #f7fbfd; }
  .day-label {
    width: 52px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--line);
    padding: 6px 2px;
  }
  .day-label .date-num { font-size: 15px; font-weight: 700; color: #1e2b33; line-height: 1; }
  .day-label.sat .date-num { color: var(--blue); }
  .day-label.sun .date-num { color: #e0574a; }
  .day-label .dow-jp { font-size: 10px; color: var(--slate); font-weight: 700; margin-top: 3px; }

  .day-content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .day-content textarea {
    border: none;
    resize: none;
    font-family: inherit;
    font-size: 12px;
    color: #1e2b33;
    padding: 5px 8px 0;
    background: repeating-linear-gradient(to bottom, transparent, transparent 23px, var(--line-soft) 23px, calc(23px + 1px));
    line-height: 24px;
    min-height: 101px;
    height: 101px;
    width: 100%;
    overflow: hidden;
    box-sizing: border-box;
  }
  .day-content textarea:focus { outline: none; background-color: #fbfeff; }

  .day-todo-cell {
    display: flex;
    flex-direction: column;
    padding: 5px 6px 0;
    border-bottom: 1px solid var(--line);
    min-height: 101px;
    box-sizing: border-box;
  }
  .day-todo-cell:last-child { border-bottom: none; }
  .day-row:nth-child(odd) .day-todo-cell { background: #f7fbfd; }
  .mini-check {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 24px;
    line-height: 24px;
  }
  .mini-check input[type="checkbox"] {
    width: 13px; height: 13px; accent-color: var(--teal); flex-shrink: 0; margin: 0; cursor: pointer;
  }
  .mini-check .mini-text {
    flex: 1; min-width: 0; border: none; border-bottom: 1px dotted var(--line-soft);
    font-family: inherit; font-size: 10px; color: #1e2b33; background: transparent; padding: 0 2px;
  }
  .mini-check .mini-text:focus { outline: none; background: #fbfeff; }
  .mini-check .mini-pick {
    width: 20px;
    height: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #f4fbfd;
    color: transparent;
    text-shadow: none;
    text-indent: -9999px;
    font-family: inherit;
    font-size: 0;
    cursor: pointer;
    padding: 0;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--slate) 50%),
                      linear-gradient(135deg, var(--slate) 50%, transparent 50%);
    background-position: calc(50% - 2px) 8px, calc(50% + 2px) 8px;
    background-size: 4px 4px, 4px 4px;
    background-repeat: no-repeat;
  }
  .mini-check .mini-pick option {
    color: #1e2b33;
    font-size: 12px;
    text-indent: 0;
  }
  .mini-check .mini-pick:focus { outline: none; border-color: var(--teal); }
  .mini-check .mini-pick:hover { background-color: #e8f7fb; }
  .mini-check input[type="checkbox"]:checked ~ .mini-text { color: #9db2ba; text-decoration: line-through; }


  .event-lines{display:flex;flex-direction:column;gap:3px;padding:4px 6px;min-height:101px}
  .event-line{display:flex;align-items:center;gap:5px;min-height:21px}
  .event-color{display:none}
  .color-picker{position:relative;flex:0 0 auto}
  .color-tile{width:26px;height:26px;border:1px solid rgba(0,0,0,.16);border-radius:6px;padding:0;cursor:pointer;display:block}
  .color-tile[data-color="white"],.color-choice[data-color="white"]{background:#ffffff;border:1px solid #bfc7cf}
.color-tile[data-color="blue"],.color-choice[data-color="blue"]{background:#2491d6}
  .color-tile[data-color="red"],.color-choice[data-color="red"]{background:#e0574a}
  .color-tile[data-color="green"],.color-choice[data-color="green"]{background:#1ac6b2}
  .color-tile[data-color="pink"],.color-choice[data-color="pink"]{background:#e97fa8}
  .color-palette{display:none;position:absolute;left:0;top:31px;z-index:50;background:#fff;border:1px solid #cfd9dd;border-radius:8px;padding:5px;gap:5px;box-shadow:0 5px 16px rgba(0,0,0,.18)}
  .color-picker.open .color-palette{display:flex}
  .color-choice{width:25px;height:25px;border:1px solid rgba(0,0,0,.14);border-radius:5px;padding:0;cursor:pointer}
  .color-choice.selected{outline:2px solid #263238;outline-offset:1px}

  .event-text{flex:1;min-width:0;border:none;border-bottom:1px dotted var(--line-soft);font:11px inherit;padding:3px 4px;background:transparent}
  .event-text:focus{outline:none;background:#fbfeff}
  
  
  
  

  /* Master TODO box (dedicated page) */
  .master-todo {
    width: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(22,50,62,0.06);
  }
  .master-todo-header {
    background: linear-gradient(160deg, var(--teal-light), var(--teal));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .master-todo-header.done {
    background: linear-gradient(160deg, #8fa6b1, #5a7480);
    font-size: 10px;
  }
  .done-empty {
    padding: 24px 12px;
    text-align: center;
    font-size: 12px;
    color: #a9b7bd;
  }
  .master-todo-body { flex: 1; display: flex; flex-direction: column; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 6px;
    border-bottom: 1px dotted var(--line);
    min-height: 22px;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item:first-child { border-top: 1px solid var(--border); }
  .todo-item:nth-child(odd) { background: #f4fdfb; }
  .todo-item .num { font-size: 9px; color: #9db2ba; width: 14px; flex-shrink: 0; }
  .todo-item input[type="checkbox"] {
    width: 13px; height: 13px; accent-color: var(--teal); flex-shrink: 0; margin: 0; cursor: pointer;
  }
  .todo-item input[type="text"] {
    flex: 1; min-width: 0; border: none; font-family: inherit; font-size: 11px; color: #1e2b33; background: transparent; padding: 3px 0;
  }
  .todo-item input[type="text"]:focus { outline: none; }
  .todo-item input[type="checkbox"]:checked ~ input[type="text"] { color: #9db2ba; text-decoration: line-through; }

  /* Memo */
  .memo { display: flex; flex-direction: column; }
  .memo-header {
    background: linear-gradient(160deg, #6b8592, var(--slate));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 8px 12px;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .memo-header::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff; opacity: 0.85;
  }
  .memo-body-wrap {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    box-shadow: 0 2px 8px rgba(22,50,62,0.06);
    overflow: hidden;
  }
  .memo textarea {
    width: 100%;
    height: 130px;
    border: none;
    resize: none;
    font-family: inherit;
    font-size: 13px;
    color: #1e2b33;
    padding: 8px 12px;
    background: repeating-linear-gradient(to bottom, transparent, transparent 25px, var(--line) 25px, calc(25px + 1px));
    line-height: 26px;
  }
  .memo textarea:focus { outline: none; }

  .footer { margin-top: 16px; text-align: center; }
  .footer .brand { font-size: 10px; font-weight: 700; color: var(--slate); letter-spacing: 1.5px; }
  .footer .tagline { font-size: 9px; color: #a9b7bd; letter-spacing: 0.5px; margin-top: 3px; }
  .page-brand { display: none; }

  .toolbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }
  .toolbar button {
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--slate);
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  .toolbar button:hover { background: #f4f6f7; }
  .toolbar button.primary {
    background: linear-gradient(135deg, var(--blue), var(--teal));
    color: #fff;
    border: none;
  }
  .save-indicator {
    text-align: center;
    font-size: 10px;
    color: #a9b7bd;
    margin-top: 6px;
    height: 14px;
  }

  /* Print-only rendered pages */
  #printArea { display: none; }

  .print-options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
    padding: 10px;
    background: #f4fbfd;
    border: 1px solid #d7e6ea;
    border-radius: 8px;
  }
  .print-opt {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    color: var(--slate);
    cursor: pointer;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .print-opt input[type="checkbox"] {
    width: 14px; height: 14px; accent-color: var(--teal); margin: 0; cursor: pointer;
  }
  .print-opt input[type="number"] {
    width: 44px; padding: 3px 4px; text-align: center; margin-left: 2px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 11px; font-weight: 700; color: var(--navy);
  }
  .print-unit { font-size: 11px; color: var(--slate); font-weight: 700; }


  .google-sync-panel{margin-top:10px;border:1px solid var(--border);border-radius:8px;background:#fff;overflow:hidden}
  .google-sync-toggle{width:100%;padding:10px 12px;border:0;background:#fff;font:700 11px inherit;color:var(--slate);cursor:pointer;text-align:left}
  .google-sync-body{display:none;padding:0 12px 12px}
  .google-sync-panel.open .google-sync-body{display:block}
  .google-sync-field{display:block;margin:8px 0}
  .google-sync-field span{display:block;font-size:10px;font-weight:700;color:var(--slate);margin-bottom:3px}
  .google-sync-field input,.google-sync-field select{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:6px;font:12px inherit}
  .google-sync-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .google-sync-actions button{flex:1;min-width:130px;padding:8px;border:1px solid var(--border);border-radius:6px;background:#f4fbfd;font:700 11px inherit;cursor:pointer}
  .google-sync-actions .primary{border:0;color:#fff;background:linear-gradient(135deg,#4285f4,#34a853)}
  .google-sync-msg{min-height:14px;margin-top:8px;text-align:center;font-size:10px;color:var(--slate)}
  .google-sync-msg.ok{color:#1a9e8f}.google-sync-msg.err{color:#c0524a}

  /* GitHub sync panel */
  .sync-panel {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .sync-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #fff;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    color: var(--slate);
    cursor: pointer;
  }
  .sync-toggle:hover { background: #f7fbfd; }
  .sync-toggle .chev { margin-left: auto; color: #b9c6cc; }
  .sync-panel.open .sync-toggle .chev { transform: rotate(180deg); }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot.off { background: #cfd9dd; }
  .dot.on  { background: var(--teal); box-shadow: 0 0 0 3px rgba(26,198,178,0.18); }

  .sync-body { display: none; padding: 0 12px 12px; }
  .sync-panel.open .sync-body { display: block; }

  .sync-help {
    font-size: 10px;
    line-height: 1.6;
    color: #8a9ba3;
    margin: 0 0 10px;
  }
  .sync-field {
    display: block;
    margin-bottom: 8px;
  }
  .sync-field span {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--slate);
    margin-bottom: 3px;
  }
  .sync-field input {
    width: 100%;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    color: var(--navy);
    box-sizing: border-box;
  }
  .sync-field input:focus { outline: none; border-color: var(--teal); }

  .sync-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .sync-actions button {
    flex: 1;
    min-width: 120px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    border: 1px solid var(--border);
    background: #f4fbfd;
    color: var(--slate);
    border-radius: 6px;
    cursor: pointer;
  }
  .sync-actions button:hover { background: #e8f7fb; }
  .sync-actions button.danger { background: #fff; color: #c0736c; border-color: #eddad8; }
  .sync-msg {
    margin-top: 8px;
    font-size: 10px;
    color: var(--slate);
    min-height: 14px;
    text-align: center;
  }
  .sync-msg.err { color: #c0524a; }
  .sync-msg.ok  { color: #1a9e8f; }


  /* 今日の行を画面上だけ強調表示 */
  .day-row.today {
    background: #fff7cc !important;
    box-shadow: inset 4px 0 0 #f2b705;
  }
  .day-row.today .day-label {
    background: #fff1a8;
  }

  @media print {
    .day-row.today,
    .day-row.today .day-label {
      background: inherit !important;
      box-shadow: none !important;
    }
    body { background: #fff !important; padding: 0 !important; margin: 0 !important; font-size: 10pt !important; }

    /* Hide the live app; show only the generated print pages */
    .sheet { display: none !important; }
    .toolbar, .save-indicator, .tabs, .footer, .print-options, .sync-panel { display: none !important; }
    .page-brand { display: none !important; }
    #printArea { display: block !important; }

    .print-sheet {
      box-shadow: none !important;
      max-width: none !important;
      width: 148mm !important;
      height: 210mm !important;
      overflow: hidden !important;
      border-radius: 0 !important;
      padding: 4mm 7mm 6mm 7mm !important;
      box-sizing: border-box !important;
      display: flex !important;
      flex-direction: column !important;
      page-break-after: always !important;
      break-after: page !important;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans CJK JP", "Yu Gothic", sans-serif !important;
      color: #1e2b33 !important;
    }
    .print-sheet:last-child { page-break-after: avoid !important; break-after: avoid !important; }

    .planner-table, .master-todo, .memo-body-wrap { box-shadow: none !important; }
    textarea, select { color: #1e2b33 !important; }

    /* Header compact for print */
    .header { margin-bottom: 2mm !important; }
    .title { font-size: 14pt !important; }
    .title .sub { font-size: 8pt !important; margin-top: 1mm !important; }
    .datebox .field { padding: 1mm 3mm !important; }
    .datebox .field span.label { font-size: 7pt !important; }
    .datebox input { font-size: 9pt !important; }
    .datebox .range-inputs input[type="date"] { width: 26mm !important; }
    .datebox .start-date { font-size: 9pt !important; min-width: 24mm !important; }
    .accent-bar { margin-bottom: 0 !important; height: 2mm !important; border-radius: 0 !important; }

    /* Page 1: schedule + memo fills the A5 sheet */
    #pageSchedule, .page-schedule {
      display: flex !important;
      flex-direction: column !important;
      flex: 1 1 auto !important;
      min-height: 0 !important;
      height: auto !important;
      max-height: none !important;
      overflow: hidden !important;

  <script>
    const DOW_JP = ['日','月','火','水','木','金','土'];
    const WEEKS_KEY = 'planner2-weeks-db-v1';   // { "2026-07-13": { days:[...], memo:"" }, ... }
    const TODOS_KEY = 'planner2-todos-db-v1';   // { items: [ {id, text, done} ] }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function escapeHtml(str) {
      return (str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }


function colorPickerHtml(color='white'){
  return `<div class="color-picker" data-color="${color}">
    <button type="button" class="color-tile" data-color="${color}" aria-label="色を選択"></button>
    <div class="color-palette">
      ${['white','blue','red','green','pink'].map(c=>`<button type="button" class="color-choice ${c===color?'selected':''}" data-color="${c}" aria-label="${c}"></button>`).join('')}
    </div>
  </div>`;
}
function setupColorPicker(picker,onChange){
  const tile=picker.querySelector('.color-tile');
  const choices=[...picker.querySelectorAll('.color-choice')];
  tile.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.color-picker.open').forEach(p=>{if(p!==picker)p.classList.remove('open')});
    picker.classList.toggle('open');
  });
  choices.forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const color=btn.dataset.color;
    picker.dataset.color=color;
    tile.dataset.color=color;
    choices.forEach(x=>x.classList.toggle('selected',x===btn));
    picker.classList.remove('open');
    if(onChange) onChange(color);
  }));
}
document.addEventListener('click',()=>document.querySelectorAll('.color-picker.open').forEach(p=>p.classList.remove('open')));

const EVENT_COLORS={
  white:{label:'',hex:'#ffffff'},
  blue:{label:'青',hex:'#2491d6'},
  red:{label:'赤',hex:'#e0574a'},
  green:{label:'緑',hex:'#1ac6b2'},
  pink:{label:'ピンク',hex:'#e97fa8'}
};
function normalizeEvents(dayData){
  if(!Array.isArray(dayData.events)){
    const lines=String(dayData.schedule||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
    dayData.events=lines.map(text=>({text,color:'white'}));
  }
  dayData.events=dayData.events
    .filter(e=>e&&typeof e.text==='string')
    .map(e=>({text:e.text,color:EVENT_COLORS[e.color]?e.color:'white'}));
  while(dayData.events.length<4) dayData.events.push({text:'',color:'white'});
}
function syncScheduleFromEvents(dayData){
  normalizeEvents(dayData);
  dayData.schedule=dayData.events.map(e=>e.text.trim()).filter(Boolean).join('\n');
}
function masterTodoOptions(selectedId=''){
  let html='<option value="">TODOリストから選択</option>';
  (todosDB.items||[]).filter(t=>!t.done).forEach(t=>{
    html+=`<option value="${t.id}" ${t.id===selectedId?'selected':''}>${escapeHtml(t.text||'(未入力)')}</option>`;
  });
  return html;
}
function linkOrCreateTodo(todo){
  const text=String(todo.text||'').trim();
  if(!text){todo.todoId=null;return}
  if(todo.todoId){
    const linked=todosDB.items.find(t=>t.id===todo.todoId);
    if(linked){linked.text=text;linked.done=!!todo.checked;return}
    todo.todoId=null;
  }
  let found=todosDB.items.find(t=>!t.done&&String(t.text||'').trim()===text);
  if(!found){
    found={id:newTodoId(),text,done:!!todo.checked};
    todosDB.items.push(found);
  }
  todo.todoId=found.id;
}


    function autoResizeTextarea(el) {
      el.style.height = 'auto';
      const min = 101;
      const line = 24;
      const needed = Math.max(min, el.scrollHeight);
      const snapped = Math.ceil((needed - 5) / line) * line + 5;
      el.style.height = snapped + 'px';
    }

    function getMondayOf(dateStr) {
      const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1 - day);
      d.setDate(d.getDate() + diff);
      return d;
    }

    function fmtDateInput(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function emptyWeek() {
      return {
        days: Array.from({length: 7}, () => ({
          schedule: '',
          todos: Array.from({length: 4}, () => ({ checked: false, text: '', todoId: null }))
        })),
        memo: ''
      };
    }

    function newTodoId() {
      return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ---- Databases (in-memory mirrors of storage) ----
    let weeksDB = {};              // keyed by week start date (YYYY-MM-DD)
    let todosDB = { items: [] };   // master TODO database (grows; never auto-trimmed)
    let currentWeekStart = fmtDateInput(getMondayOf(null));
    let printWeeks = 1;            // how many weeks to print
    let saveTimer = null;
    let lastUserEditAt = 0;
    let isPulling = false;

    function currentWeek() {
      if (!weeksDB[currentWeekStart]) weeksDB[currentWeekStart] = emptyWeek();
      const w = weeksDB[currentWeekStart];
      // normalize
      if (!Array.isArray(w.days) || w.days.length !== 7) w.days = emptyWeek().days;
      w.days.forEach(d => {
        normalizeEvents(d);
        if (!Array.isArray(d.todos)) d.todos = [];
        while (d.todos.length < 4) d.todos.push({ checked: false, text: '', todoId: null });
        d.todos.forEach(t => {
          if (typeof t.text !== 'string') t.text = '';
          if (t.todoId === undefined) t.todoId = null;
          if (typeof t.checked !== 'boolean') t.checked = false;
        });
      });
      if (typeof w.memo !== 'string') w.memo = '';
      return w;
    }

    // Always show exactly 20 rows in the TODO list: unchecked items first (kept in DB),
    // padded with blanks. Checked items stay in the DB but disappear from the visible list.
    function visibleTodos() {
      const active = todosDB.items.filter(t => !t.done);
      const rows = active.slice(0, 20);
      while (rows.length < 20) rows.push(null);
      return rows;
    }

    async function loadDB() {
      try {
        if (window.storage && typeof window.storage.get === 'function') {
          try {
            const w = await window.storage.get(WEEKS_KEY, false);
            if (w && w.value) weeksDB = JSON.parse(w.value) || {};
          } catch (e) { /* no weeks yet */ }
          try {
            const t = await window.storage.get(TODOS_KEY, false);
            if (t && t.value) todosDB = JSON.parse(t.value) || { items: [] };
          } catch (e) { /* no todos yet */ }
        }
      } catch (e) { /* storage unavailable */ }
      if (!todosDB || !Array.isArray(todosDB.items)) todosDB = { items: [] };
      if (!weeksDB || typeof weeksDB !== 'object') weeksDB = {};
      render();
    }

    function scheduleSave() {
      lastUserEditAt = Date.now();
      const indicator = document.getElementById('saveIndicator');
      indicator.textContent = '編集中...';
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(saveDB, 600);
    }

    async function saveDB() {
      const indicator = document.getElementById('saveIndicator');
      if (!window.storage || typeof window.storage.set !== 'function') {
        indicator.textContent = 'この画面内でのみ保持されます（自動保存は利用できません）';
        return;
      }
      try {
        await window.storage.set(WEEKS_KEY, JSON.stringify(weeksDB), false);
        await window.storage.set(TODOS_KEY, JSON.stringify(todosDB), false);
        indicator.textContent = 'データベースに保存しました';
        setTimeout(() => {
          if (indicator.textContent === 'データベースに保存しました') indicator.textContent = '';
        }, 1800);
        scheduleCloudPush();
      } catch (e) {
        console.error('storage save error:', e);
        indicator.textContent = '保存に失敗しました（もう一度お試しください）';
      }
    }

    function computeDayMeta(weekStart) {
      const monday = new Date(weekStart + 'T00:00:00');
      const metas = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        metas.push({
          label: `${d.getMonth()+1}/${d.getDate()}`,
          dow: DOW_JP[d.getDay()],
          isSat: d.getDay() === 6,
          isSun: d.getDay() === 0
        });
      }
      return metas;
    }

    function todoOptionsHtml(selectedId) {
      let html = '<option value="">（直接入力／未選択）</option>';
      todosDB.items.filter(t => !t.done).forEach(t => {
        const sel = t.id === selectedId ? ' selected' : '';
        html += `<option value="${t.id}"${sel}>${escapeHtml(t.text) || '(未入力)'}</option>`;
      });
      return html;
    }

    function render() {
      const week = currentWeek();
      const startD = new Date(currentWeekStart + 'T00:00:00');
      const endD = new Date(startD);
      endD.setDate(startD.getDate() + 6);
      document.getElementById('startDateLabel').textContent =
        `${startD.getFullYear()}/${pad(startD.getMonth()+1)}/${pad(startD.getDate())}`;
      document.getElementById('endDateInput').value = fmtDateInput(endD);
      document.getElementById('memoText').value = week.memo;

      const metas = computeDayMeta(currentWeekStart);

      // Schedule column
      const dayColumn = document.getElementById('dayColumn');
      dayColumn.innerHTML = '';
      metas.forEach((meta, i) => {
        const row = document.createElement('div');
        const rowDate = new Date(startD);
        rowDate.setDate(startD.getDate() + i);
        const today = new Date();
        const isToday =
          rowDate.getFullYear() === today.getFullYear() &&
          rowDate.getMonth() === today.getMonth() &&
          rowDate.getDate() === today.getDate();
        row.className = 'day-row' + (isToday ? ' today' : '');
        const labelClass = meta.isSat ? 'day-label sat' : (meta.isSun ? 'day-label sun' : 'day-label');
        normalizeEvents(week.days[i]);
        row.innerHTML = `
          <div class="${labelClass}">
            <span class="date-num">${meta.label}</span>
            <span class="dow-jp">(${meta.dow})</span>
          </div>
          <div class="day-content">
            <div class="event-lines"></div>
          </div>
        `;
        dayColumn.appendChild(row);
        const lines=row.querySelector('.event-lines');
        week.days[i].events.forEach((event,eventIndex)=>{
          const line=document.createElement('div');
          line.className='event-line';
          line.dataset.color=event.color;
          line.innerHTML=`
            ${colorPickerHtml(event.color)}
            <input class="event-text" type="text" placeholder="">
          `;
          const picker=line.querySelector('.color-picker');
          const input=line.querySelector('.event-text');
          input.value=event.text;
          setupColorPicker(picker,color=>{
            event.color=color;
            line.dataset.color=color;
            syncScheduleFromEvents(week.days[i]);
            scheduleSave();
          });
          input.addEventListener('input',e=>{
            event.text=e.target.value;

          const textInput = row.querySelector('.mini-text');
          const select = row.querySelector('.mini-pick');
          textInput.value = todo.text || '';

          checkbox.addEventListener('change', (e) => {
            todo.checked = e.target.checked;
            // Reflect completion back into the TODO DB if it came from there
            if (todo.todoId) {
              const dbItem = todosDB.items.find(t => t.id === todo.todoId);
              if (dbItem) dbItem.done = e.target.checked;
            }
            scheduleSave();
            render();
          });

          textInput.addEventListener('input', (e) => {
            todo.text = e.target.value;
            if(todo.todoId){
              const linked=todosDB.items.find(t=>t.id===todo.todoId);
              if(linked) linked.text=todo.text;
            }
            scheduleSave();
          });
          textInput.addEventListener('blur',()=>{
            linkOrCreateTodo(todo);

            render();
          });

          select.addEventListener('change', (e) => {
            const id = e.target.value;
            if (!id) {
              todo.todoId = null;
            } else {
              const dbItem = todosDB.items.find(t => t.id === id);
              if (dbItem) {
                todo.todoId = dbItem.id;
                todo.text = dbItem.text;
                textInput.value = dbItem.text;
              }

            scheduleSave();

          cell.appendChild(row);

      // Master TODO list: always 20 visible rows; checked items vanish from view but stay in DB

        const checkbox = row.querySelector('input[type="checkbox"]');
        const text = row.querySelector('input[type="text"]');
        text.value = item ? item.text : '';

        checkbox.addEventListener('change', () => {
          if (item) {

            scheduleSave();

        text.addEventListener('input', (e) => {

            todosDB.items.push(created);
            scheduleSave();

            // keep focus on the newly created row

            if (inputs[i]) { inputs[i].focus(); inputs[i].setSelectionRange(val.length, val.length); }
            return;

        });

        masterBody.appendChild(row);
      });

      // Completed TODO list: unchecking sends the item back to the active list
      const doneBody = document.getElementById('doneTodoBody');
      doneBody.innerHTML = '';
      const doneItems = todosDB.items.filter(t => t.done);
      if (doneItems.length === 0) {

            scheduleSave();
          });

          doneBody.appendChild(row);
        });
      }
    }

    async function loadGhCfg() {

    function readGhInputs() {

    function ghHeaders() {
      return {
        'Authorization': 'Bearer ' + ghCfg.token,

      };

    function snapshot() {
      return JSON.stringify({
        version: 1,
        updatedAt: new Date().toISOString(),

      }, null, 2);

    async function pushToGist(silent) {
      readGhInputs();
      if (!ghCfg.token) { if (!silent) syncMsg('GitHubトークンを入力してください', 'err'); return; }

      if (!silent) syncMsg('クラウドに保存中...');
      const body = {
        description: '進路相談室 ROUTE - 別ユーザー用週間プランナー2 データ',
        public: false,
        files: { [GIST_FILE]: { content: snapshot() } }
      };

      try {
        let res;
        if (ghCfg.gistId) {
          res = await fetch('https://api.github.com/gists/' + ghCfg.gistId, {
            method: 'PATCH', headers: ghHeaders(), body: JSON.stringify(body)
          });
        } else {
          res = await fetch('https://api.github.com/gists', {
            method: 'POST', headers: ghHeaders(), body: JSON.stringify(body)
          });
        }

        if (!res.ok) {
          const t = await res.text();
          syncMsg(`保存に失敗しました (${res.status})。トークンの権限（gist）をご確認ください。`, 'err');
          console.error('gist push failed:', res.status, t);
          return;
        }

        const data = await res.json();
        if (!ghCfg.gistId) {
          ghCfg.gistId = data.id;
          document.getElementById('ghGist').value = data.id;
        }
        await saveGhCfg();
        syncMsg('クラウドに保存しました（' + new Date().toLocaleTimeString('ja-JP') + '）', 'ok');
      } catch (e) {
        console.error(e);
        syncMsg('通信に失敗しました。ネット接続をご確認ください。', 'err');
      }
    }

    async function pullFromGist() {
      readGhInputs();
      if (!ghCfg.token)  { syncMsg('GitHubトークンを入力してください', 'err'); return; }
      if (!ghCfg.gistId) { syncMsg('Gist IDを入力してください（初回はまず「クラウドへ保存」）', 'err'); return; }

      syncMsg('クラウドから読込中...');
      isPulling = true;
      try {
        const res = await fetch('https://api.github.com/gists/' + ghCfg.gistId, { headers: ghHeaders() });
        if (!res.ok) {
          syncMsg(`読込に失敗しました (${res.status})。トークンとGist IDをご確認ください。`, 'err');
          return;
        }
        const data = await res.json();
        const file = data.files && data.files[GIST_FILE];
        if (!file) { syncMsg('データファイルが見つかりません', 'err'); return; }

        let content = file.content;
        if (file.truncated && file.raw_url) {
          content = await (await fetch(file.raw_url)).text();
        }

        const parsed = JSON.parse(content);
        if (parsed.weeks) weeksDB = parsed.weeks;
        if (parsed.todos && Array.isArray(parsed.todos.items)) todosDB = parsed.todos;

        await saveGhCfg();
        await saveDB();       // mirror into this device's local storage
        render();
        const when = parsed.updatedAt ? new Date(parsed.updatedAt).toLocaleString('ja-JP') : '';
        syncMsg('クラウドから読み込みました' + (when ? '（保存日時: ' + when + '）' : ''), 'ok');
      } catch (e) {
        console.error(e);
        syncMsg('通信に失敗しました。ネット接続をご確認ください。', 'err');
      } finally {
        isPulling = false;
      }
    }

    // ===== Google Calendar one-way sync + 30-second auto sync =====
    const GOOGLE_CFG_KEY='planner-google-calendar-cfg-v1';
    const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.events';
    const GOOGLE_AUTO_SYNC_MS=30000;
    const GOOGLE_LOGIN_HINT='yuko.iphone@gmail.com';

    let googleTokenClient=null;
    let googleAccessToken='';
    let googleTokenExpiresAt=0;
    let googleSyncInProgress=false;
    let googleAutoSyncTimer=null;
    let googleReconnectNoticeShown=false;

    function gmsg(t,k=''){
      const e=document.getElementById('googleSyncMsg');
      e.textContent=t;
      e.className='google-sync-msg'+(k?' '+k:'');
    }

    function saveGoogleClientId(){
      localStorage.setItem(
        GOOGLE_CFG_KEY,
        document.getElementById('googleClientId').value.trim()
      );
    }

    function loadGoogleClientId(){
      document.getElementById('googleClientId').value=
        localStorage.getItem(GOOGLE_CFG_KEY)||'';
    }

    function hasValidGoogleToken(){
      return !!googleAccessToken && Date.now() < googleTokenExpiresAt;
    }

    function clearGoogleToken(){
      googleAccessToken='';
      googleTokenExpiresAt=0;
    }

    function initGoogle(){
      saveGoogleClientId();
      const clientId=document.getElementById('googleClientId').value.trim();

      if(!clientId){
        gmsg('OAuthクライアントIDを入力してください','err');
        return false;
      }

      if(!window.google||!google.accounts||!google.accounts.oauth2){
        gmsg('Google認証を読み込めません。通信状態を確認してください','err');
        return false;
      }

      googleTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:clientId,
        scope:GOOGLE_SCOPE,
        login_hint:GOOGLE_LOGIN_HINT,
        callback:()=>{}
      });
      return true;
    }

    function authGoogle(){
      return new Promise((resolve,reject)=>{
        if(!initGoogle()){
          reject(new Error('Google認証の初期化に失敗しました'));
          return;
        }

        googleTokenClient.callback=r=>{
          if(r.error){
            clearGoogleToken();
            reject(new Error(r.error));
            return;
          }

          googleAccessToken=r.access_token;
          const expiresIn=Math.max(60,Number(r.expires_in)||3600);
          googleTokenExpiresAt=Date.now()+(expiresIn*1000)-60000;
          googleReconnectNoticeShown=false;
          resolve(r.access_token);
        };

        // Googleの仕様上、初回接続や期限切れ後の再接続には
        // ユーザー操作が必要です。
        // 以前に許可済みなら同意画面を強制せず、妻のアカウントを優先します。
        // Googleの仕様上、期限切れ後はボタン操作が必要な場合があります。
        googleTokenClient.requestAccessToken({prompt:''});
      });
    }

    function addDays2(d,n){
      const x=new Date(d);
      x.setDate(x.getDate()+n);
      return x;
    }

    function dkey(d){
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function collectGoogleEvents(){
      const start=new Date(currentWeekStart+'T00:00:00');
      const days=document.getElementById('googleSyncRange').value==='year'?365:7;
      const end=addDays2(start,days);
      const out=[];

      for(let d=new Date(start);d<end;d=addDays2(d,1)){
        const monday=getMondayOf(dkey(d));
        const weekKey=fmtDateInput(monday);
        const idx=(d.getDay()+6)%7;
        const w=weeksDB[weekKey];

        if(!w||!w.days||!w.days[idx]) continue;

        const schedule=String(w.days[idx].schedule||'').trim();
        if(!schedule) continue;

        const summary=schedule.split(/\r?\n/).find(Boolean)||'予定';
        out.push({
          date:dkey(d),
          summary:summary.slice(0,120),
          description:schedule,
          key:'route-'+dkey(d)
        });
      }
      return out;
    }

    async function gapi(url,opt={}){
      const r=await fetch(url,{
        ...opt,
        headers:{
          Authorization:'Bearer '+googleAccessToken,
          'Content-Type':'application/json',
          ...(opt.headers||{})
        }
      });

      if(!r.ok){
        const err=new Error('Google Calendar API エラー '+r.status);
        err.status=r.status;
        throw err;
      }

      return r.status===204?null:r.json();
    }

    async function existingManaged(start,end){
      const q=new URLSearchParams({
        timeMin:start.toISOString(),
        timeMax:end.toISOString(),
        singleEvents:'true',
        privateExtendedProperty:'routePlannerManaged=true',
        maxResults:'2500'
      });

      const data=await gapi(
        'https://www.googleapis.com/calendar/v3/calendars/primary/events?'+q
      );
      return data.items||[];
    }

    async function syncGoogle(options={}){
      const {auto=false}=options;

      if(googleSyncInProgress) return false;
      if(!navigator.onLine){
        if(!auto) gmsg('オフラインのため同期できません','err');
        return false;
      }

      if(!hasValidGoogleToken()){
        if(auto){
          if(!googleReconnectNoticeShown){
            gmsg('Google自動同期待機中：Googleに再接続してください','err');
            googleReconnectNoticeShown=true;
          }
          return false;
        }
        await authGoogle();
      }

      googleSyncInProgress=true;

      try{
        if(!auto) gmsg('同期準備中…');

        const items=collectGoogleEvents();
        const checkedAt=new Date().toLocaleTimeString('ja-JP');

        const syncStart=new Date(currentWeekStart+'T00:00:00');
        const syncDays=document.getElementById('googleSyncRange').value==='year'?365:7;
        const start=syncStart;
        const end=addDays2(syncStart,syncDays+1);

        const existing=await existingManaged(start,end);
        const map=new Map();

        existing.forEach(e=>{
          const k=e.extendedProperties
            &&e.extendedProperties.private
            &&e.extendedProperties.private.routePlannerKey;
          if(k) map.set(k,e);
        });

        let add=0;
        let upd=0;
        let del=0;

        const desiredKeys=new Set(items.map(item=>item.key));

        for(const item of items){
          const body={
            summary:item.summary,
            description:item.description+'\n\n週間プランナーから同期',
            start:{date:item.date},
            end:{date:dkey(addDays2(new Date(item.date+'T00:00:00'),1))},
            extendedProperties:{
              private:{
                routePlannerManaged:'true',
                routePlannerKey:item.key
              }
            }
          };

          const old=map.get(item.key);

          if(old){
            await gapi(
              'https://www.googleapis.com/calendar/v3/calendars/primary/events/'
              +encodeURIComponent(old.id),
              {method:'PATCH',body:JSON.stringify(body)}
            );
            upd++;
          }else{
            await gapi(
              'https://www.googleapis.com/calendar/v3/calendars/primary/events',
              {method:'POST',body:JSON.stringify(body)}
            );
            add++;
          }
        }

        // 週間プランナーから消えた予定は、Google側でも削除する。
        // 対象は routePlannerManaged=true の予定だけなので、
        // Googleカレンダーへ直接入力した家族の予定は削除しない。
        for(const managedEvent of existing){
          const key=managedEvent.extendedProperties
            &&managedEvent.extendedProperties.private
            &&managedEvent.extendedProperties.private.routePlannerKey;

          if(key && !desiredKeys.has(key)){
            await gapi(
              'https://www.googleapis.com/calendar/v3/calendars/primary/events/'
              +encodeURIComponent(managedEvent.id),
              {method:'DELETE'}
            );
            del++;
          }
        }

        const mode=auto?'自動同期':'同期';
        gmsg(
          `${mode}完了：新規${add}件、更新${upd}件、削除${del}件（${checkedAt}）`,
          'ok'
        );
        return true;

      }catch(e){
        console.error(e);

        if(e.status===401||e.status===403){
          clearGoogleToken();
          googleReconnectNoticeShown=true;
          gmsg('Googleの接続期限が切れました。「Googleに接続」を押してください','err');
        }else{
          gmsg(e.message||'同期に失敗しました','err');
        }
        return false;

      }finally{
        googleSyncInProgress=false;
      }
    }

    async function autoSyncGoogleIfReady(){
      if(document.visibilityState==='hidden') return;
      if(!navigator.onLine||googleSyncInProgress) return;

      const clientId=document.getElementById('googleClientId').value.trim();
      if(!clientId) return;

      await syncGoogle({auto:true});
    }

    function startGoogleAutoSync(){
      if(googleAutoSyncTimer) clearInterval(googleAutoSyncTimer);
      googleAutoSyncTimer=setInterval(
        autoSyncGoogleIfReady,
        GOOGLE_AUTO_SYNC_MS
      );

      // ページ表示後、Google接続済みならすぐ同期
      setTimeout(autoSyncGoogleIfReady,1500);
    }

    document.getElementById('googleSyncToggle').onclick=()=>{
      document.querySelector('.google-sync-panel').classList.toggle('open');
    };

    document.getElementById('googleClientId').addEventListener('input',()=>{
      saveGoogleClientId();
      clearGoogleToken();
      googleReconnectNoticeShown=false;
      gmsg('クライアントIDを保存しました。Googleに接続してください');
    });

    document.getElementById('googleConnectBtn').onclick=async()=>{
      try{
        gmsg('接続中…');
        await authGoogle();
        gmsg('Googleに接続しました。自動同期を開始します','ok');
        await syncGoogle({auto:true});
      }catch(e){
        gmsg(e.message||'接続に失敗しました','err');
      }
    };

    document.getElementById('googleSyncBtn').onclick=()=>{
      syncGoogle({auto:false});
    };


    async function saveAndSyncAll(){
      const saveBtn=document.getElementById('saveBtn');
      const indicator=document.getElementById('saveIndicator');
      const originalText=saveBtn.textContent;

      if(saveBtn.disabled) return;

      saveBtn.disabled=true;
      saveBtn.textContent='保存中…';
      indicator.textContent='端末・クラウド・Googleカレンダーへ保存しています…';

      try{
        // 1. 端末内へ保存
        await saveDB();

        // 2. GitHub Gistへ即時保存（接続済みの場合）
        readGhInputs();
        if(ghCfg.token&&ghCfg.gistId&&navigator.onLine){
          if(pushTimer){
            clearTimeout(pushTimer);
            pushTimer=null;
          }
          await pushToGist(true);
        }

        // 3. Googleカレンダーへ同期
        const clientId=document.getElementById('googleClientId').value.trim();
        if(clientId&&navigator.onLine){
          const googleOk=await syncGoogle({auto:false});
          if(!googleOk){
            indicator.textContent='端末とGitHubには保存しました。Googleは再接続が必要です';
            return;
          }
        }

        indicator.textContent='すべて保存・同期しました';
        setTimeout(()=>{
          if(indicator.textContent==='すべて保存・同期しました'){
            indicator.textContent='';
          }
        },2500);

      }catch(e){
        console.error(e);
        indicator.textContent='保存または同期に失敗しました。接続状態を確認してください';
      }finally{
        saveBtn.disabled=false;
        saveBtn.textContent=originalText;
      }
    }

    document.getElementById('saveBtn').addEventListener('click',saveAndSyncAll);

    window.addEventListener('online',autoSyncGoogleIfReady);
    window.addEventListener('focus',autoSyncGoogleIfReady);
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'){
        autoSyncGoogleIfReady();
      }
    });

    loadGoogleClientId();
    startGoogleAutoSync();

    initializePlanner();

    const requestedView = new URLSearchParams(window.location.search).get('view');
    if (requestedView === 'todo' || requestedView === 'done') {
      switchTab(requestedView);
    }
  </script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
}
</script>

</body>
</html>
